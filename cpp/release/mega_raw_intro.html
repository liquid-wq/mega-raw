// Keyframes: t=ms, f=Frame, x=X-Fraction, arc=Y-Offset(neg=hoch)
const KF=[
 {t:0,   f:11,x:0,arc:0},  // von Anfang an sitzend praesent
 {t:3700,f:8, x:0,arc:0},  // Miau (offenes Maeulchen) -> RAWR + Shockwave
 {t:4500,f:9, x:0,arc:0},  // Hinsetzen 1
 {t:4800,f:10,x:0,arc:0},  // Hinsetzen 2
 {t:5100,f:11,x:0,arc:0},  // Endpose
];
function lerp(a,b,t){return a+(b-a)*t;}
function easeInOut(x){return x<0.5?4*x*x*x:1-Math.pow(-2*x+2,3)/2;}

function jasonState(t){
  if(t<KF[0].t) return {f:-1,nf:-1,xf:0,x:-0.50,arc:0,alpha:0};
  let ki=KF.length-1;
  for(let i=0;i<KF.length-1;i++){if(t>=KF[i].t&&t<KF[i+1].t){ki=i;break;}}
  const c=KF[ki],n=(ki<KF.length-1)?KF[ki+1]:c;
  const p=(ki<KF.length-1)?(t-c.t)/(n.t-c.t):1;
  const ep=easeInOut(Math.min(1,p));
  const alpha=1;
  // Crossfade: in den letzten 40% des Pose-Intervalls die naechste Pose einblenden.
  // Gilt nur fuer Lauf/Sitz-Posen (ab Landung), NICHT fuer die Flugphase (0-2),
  // weil dort die Posen zu verschieden sind und Matsch ergeben.
  let nf=c.f, xf=0;
  return {f:c.f,nf:nf,xf:xf,x:lerp(c.x,n.x,ep),arc:lerp(c.arc,n.arc,ep),alpha:alpha};
}

const FULL='MEGA-RETROACHIEVEMENTS';
let burstDone=false;
let shockT=null,shockX=0,shockY=0;
function textForTime(t){
  if(t<1600){const n=Math.floor((t/1600)*FULL.length);return {txt:FULL.slice(0,n+1),cursor:true};}
  if(t<2300) return {txt:FULL,extra:true};
  // Phase A: von rechts loeschen bis zum roten A -> MEGA-RETROA bleibt stehen
  if(t<3050){const tg='MEGA-RETROA',p=(t-2300)/750;
    const rem=Math.floor(easeInOut(Math.min(1,p))*(FULL.length-tg.length));
    return {txt:FULL.slice(0,Math.max(tg.length,FULL.length-rem))};}
  // Phase B: das rote A auslassen, ETRO dazwischen loeschen -> MEGA-R + A = MEGA-RA
  if(t<3400){const p=easeInOut(Math.min(1,(t-3050)/350));
    // ETRO sind 4 Buchstaben (Index 6..9), von rechts an A heran loeschen
    const del=Math.round(p*4);            // wie viele von ETRO geloescht
    const mid='ETRO'.slice(0,4-del);      // verbleibendes Stueck von ETRO
    return {txt:'MEGA-R'+mid+'A'};}
  if(t<3700) return {txt:'MEGA-RA'};
  if(t<4500){const p=(t-3700)/800,r=Math.floor(p*8);return {txt:'MEGA-RAW'+'R'.repeat(r),rawr:true,rawrP:p};}
  if(t<5100){const p=easeInOut((t-4500)/600),r=Math.round(8*(1-p));return {txt:'MEGA-RAW'+'R'.repeat(r)};}
  const raFade=(t>5900)?Math.max(0,1-(t-5900)/600):1;
  return {txt:'MEGA-RAW',raFade:raFade};
}

let stars=[],bursts=[];
function initStars(){stars=[];for(let i=0;i<70;i++)
  stars.push({x:Math.random()*W,y:Math.random()*H,z:Math.random()*0.6+0.4,s:Math.random()*2.5+1.2})};
function spawnBurst(cx,cy){for(let i=0;i<55;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*7+2;
  bursts.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,col:Math.random()>0.5?'#e8b84b':'#fff2c0'});}}

function drawBubble(cx,cy,a){if(a<0.01)return;ctx.save();ctx.globalAlpha=a;
  const bw=50,bh=26,r=7,bx=cx+12,by=cy;ctx.fillStyle='#fffdf0';ctx.beginPath();
  ctx.moveTo(bx+r,by);ctx.lineTo(bx+bw-r,by);ctx.quadraticCurveTo(bx+bw,by,bx+bw,by+r);
  ctx.lineTo(bx+bw,by+bh-r);ctx.quadraticCurveTo(bx+bw,by+bh,bx+bw-r,by+bh);
  ctx.lineTo(bx+r,by+bh);ctx.quadraticCurveTo(bx,by+bh,bx,by+bh-r);
  ctx.lineTo(bx,by+r);ctx.quadraticCurveTo(bx,by,bx+r,by);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(bx+4,by+bh);ctx.lineTo(bx-7,by+bh+11);ctx.lineTo(bx+16,by+bh);ctx.fill();
  ctx.fillStyle='#666';ctx.font='bold 15px Courier New';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('...',bx+bw/2,by+bh/2);ctx.restore();}

let t0=null;const DUR=7800;
function frame(ts){
  if(t0===null)t0=ts;const t=ts-t0;
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#05050a';ctx.fillRect(0,0,W,H);
  const bg=ctx.createRadialGradient(W/2,H/2,80,W/2,H/2,Math.max(W,H)*0.7);
  bg.addColorStop(0,'rgba(30,26,18,0.6)');bg.addColorStop(1,'rgba(5,5,10,0.6)');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  for(const st of stars){st.x-=st.z*0.3;if(st.x<0)st.x=W;
    ctx.globalAlpha=st.z*0.7+0.3;ctx.fillStyle='#fff2c0';ctx.fillRect(st.x,st.y,st.s,st.s);}
  ctx.globalAlpha=1;
  const cx=W/2,cy=H/2;
  const ti=textForTime(t),js=jasonState(t);
  const shk=ti.rawr?(1-ti.rawrP)*14:0;
  const sx=(Math.random()-0.5)*shk,sy=(Math.random()-0.5)*shk*0.4;

  // Shockwave beim RAWR (Frame 8 = MIAU). Startzeit merken.
  // Ursprung auf Jasons Gesicht: groundY minus Kopfhoehe (aus Frame-Geometrie).
  if(js.f===8&&shockT===null){
    shockT=t; shockX=cx+js.x*W;
    const mm=FMETA[8], dh=Math.min(H*0.20,100), sc=dh/mm.h;
    const gY=cy+H*0.05;
    shockY = gY - (mm.bottom - mm.cy)*sc;  // auf Gesichtshoehe
  }
  if(shockT!==null){
    const rt=(t-shockT)/600;  // Welle laeuft ueber 600ms
    if(rt>=0&&rt<1){
      const rad=rt*W*0.6;
      const grd=ctx.createRadialGradient(shockX,shockY,rad*0.7,shockX,shockY,rad);
      grd.addColorStop(0,'rgba(255,246,216,0)');
      grd.addColorStop(0.8,'rgba(255,246,216,'+(1-rt)*0.5+')');
      grd.addColorStop(1,'rgba(255,246,216,0)');
      ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
      ctx.strokeStyle='rgba(255,255,255,'+(1-rt)+')';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(shockX,shockY,rad,0,Math.PI*2);ctx.stroke();
    }
  }

  if(js.f>=0&&js.f<12&&FIMG[js.f].complete){
    const dispH=Math.min(H*0.20,100);
    const groundY=cy+H*0.05;
    // Helper: einen Frame bodenverankert an (tx) zeichnen mit gegebener Deckkraft
    function drawFrame(fi, alpha){
      const m=FMETA[fi], img=FIMG[fi];
      const scale=dispH/m.h, dispW=m.w*scale;
      const tx=cx+js.x*W+sx, ty=groundY+js.arc*H+sy;
      const dx=tx-m.cx*scale, dy=ty-m.bottom*scale;
      ctx.save();ctx.globalAlpha=alpha;ctx.drawImage(img,Math.round(dx),Math.round(dy),Math.round(dispW),Math.round(dispH));ctx.restore();
    }
    // Crossfade zwischen aktueller und naechster Pose (nur Lauf/Sitz, nicht Flug)
    if(js.xf>0 && js.nf!==js.f && FIMG[js.nf].complete){
      drawFrame(js.f, js.alpha*(1-js.xf));
      drawFrame(js.nf, js.alpha*js.xf);
    }else{
      drawFrame(js.f, js.alpha);
    }
    // Sprechblase
    const m=FMETA[js.f], scale=dispH/m.h, dispW=m.w*scale;
    const tx=cx+js.x*W+sx, ty=groundY+js.arc*H+sy;
    let ba=0;
    if(js.f===11 && t>=3400 && t<3700)ba=Math.min(1,(t-3400)/250);  // stilles Miauen vor RAWR
    else if(js.f===8)ba=Math.max(0,1-(t-3700)/250);                  // verschwindet beim RAWR
    if(ba>0){const bx=tx+dispW*0.18,by=ty-m.cy*scale-dispH*0.22;drawBubble(bx,by,ba);}
  }

  const ts2=Math.round(Math.min(W*0.06,56));
  ctx.save();ctx.translate(Math.round(cx+sx),Math.round(cy+H*0.19+sy));
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.font='bold '+ts2+"px 'Courier New',monospace";
  const full=ti.txt,cursor=(ti.cursor&&Math.floor(t/250)%2===0);
  const baseCol=ti.rawr?'#fff6d8':'#e8b84b';
  const raFade=(ti.raFade!==undefined)?ti.raFade:(ti.rawr?0:1);
  function mix(a,b,p){return Math.round(a+(b-a)*p);}
  const rR=[255,77,77],gR=[parseInt(baseCol.slice(1,3),16),parseInt(baseCol.slice(3,5),16),parseInt(baseCol.slice(5,7),16)];
  const HL='rgb('+mix(gR[0],rR[0],raFade)+','+mix(gR[1],rR[1],raFade)+','+mix(gR[2],rR[2],raFade)+')';
  let rIdx=(full[5]==='R')?5:-1,aIdx=-1;
  if(full.startsWith('MEGA-R')&&full.endsWith('A')&&full.length>=7)aIdx=full.length-1;
  else if(full.startsWith('MEGA-RETROA'))aIdx=10;else if(full.startsWith('MEGA-RA'))aIdx=6;
  if(ti.rawr){ctx.shadowColor='rgba(232,184,75,'+(0.6+ti.rawrP*0.4)+')';ctx.shadowBlur=40;}
  const tw=ctx.measureText(full+(cursor?'_':'')).width;let x=-tw/2;ctx.textAlign='left';
  for(let i=0;i<full.length;i++){ctx.fillStyle=(i===rIdx||i===aIdx)?HL:baseCol;
    ctx.fillText(full[i],Math.round(x),0);x+=ctx.measureText(full[i]).width;}
  if(cursor){ctx.fillStyle=baseCol;ctx.fillText('_',Math.round(x),0);}
  ctx.shadowBlur=0;ctx.restore();

  ctx.save();ctx.globalAlpha=0.5;ctx.textAlign='center';ctx.fillStyle='#8a7a4a';
    ctx.font='italic '+Math.min(W*0.02,18)+"px 'Courier New',monospace";
    ctx.fillText('© Liqui',cx,cy+H*0.22);ctx.restore();

  if(t<DUR)requestAnimationFrame(frame);
  else if(window.pywebview&&window.pywebview.api&&!window._introDone){window._introDone=true;window.pywebview.api.intro_fertig();}
}
function play(){t0=null;burstDone=false;bursts=[];shockT=null;initStars();if(window.pywebview&&window.pywebview.api&&window.pywebview.api.intro_start&&!window._introStarted){window._introStarted=true;window.pywebview.api.intro_start();}setTimeout(function(){requestAnimationFrame(frame);},1000);}
function waitAndPlay(){if(framesReady>=12)play();else setTimeout(waitAndPlay,50);}
setTimeout(waitAndPlay, 2000);
</script>
